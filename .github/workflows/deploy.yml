# Автодеплой k1.surf на Timeweb по FTP.
# Срабатывает при push в ветку main. Заливает только содержимое папки site/.
name: Deploy to Timeweb (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 60000
          local-dir: ./site/
          server-dir: /k1.surf/public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.DS_Store
